[[recipe]]
name = "sync current branch"
interactive = false
tags = ["git", "sync"]
description = "Fetch and rebase current branch onto origin/{branch}."
command = "git fetch origin && git rebase origin/{branch}"
safety = "confirm"
presets = ["branch=main", "branch=master"]

[[recipe]]
name = "sollum cloud database"
tags = ["sql", "sollum"]
description = "Install psql and connect to cloud database"
safety = "confirm"
command = """
apt update
apt install postgresql-client -y
apk add postgresql16-client
PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -h $POSTGRES_HOST -d smdatawarehouse_db
"""

[[recipe]]
name = "insecure sollum ssh"
tags = ["ssh", "sollum"]
description = "SSH with legacy crypto algorithm"
safety = "confirm"
command = "ssh -o HostKeyAlgorithms=ssh-ed25519,rsa-sha2-512,rsa-sha2-256 edgyboy@"

[[recipe]]
name = "cloud mqtt"
tags = ["mqtt", "sollum"]
description = "Install MQTT client and listen to all topics"
safety = "confirm"
command = """
apt install wget
wget https://www.emqx.com/zh/downloads/MQTTX/v1.8.0/mqttx-cli-linux-x64
install ./mqttx-cli-linux-x64 /usr/local/bin/mqttx
mqttx sub -t '#' -p $MQTT_PORT -h $MQTT_HOST -u $MQTT_USERNAME --password $MQTT_PASSWORD
"""

[[recipe]]
name = "evil timesheet"
tags = ["timesheet", "sollum"]
description = "Some JS black magic to fill in time shit"
safety = "confirm"
command = """
const startNum = {start};
const boxes = Array.from({ length: 5 }, (_, i) => `#__box${startNum + i}-inner`); 
boxes.forEach((e) => {
   const inputField = document.querySelector(e);
   inputField.value = "08:00"
   setTimeout(inputField.dispatchEvent(new Event('input', { bubbles: true })), 100); 
})
"""

[[recipe]]
name = "sunaas reverse proxy"
tags = ["proxy", "sollum"]
description = "Run reverse proxy to SUNaas backend"
safety = "confirm"
command = """
cd $HOME/Documents/sollum/sollummicroservicearchitecture/proxy
BACKEND_PORT={backend_port} FRONTEND_PORT={frontend_port} SERVICE={service} ./proxy.sh {env}
"""
presets = [
  "backend_port=8190 frontend_port=5180 service=smclientportal env=dev",
  "backend_port=8190 frontend_port=5180 service=smclientportal env=prod",
]
choices = { service = ["smclientportal", "smgreenhousemanager"], env = ["dev", "staging", "prod"] }

[[recipe]]
name = "force kill k8s pod"
tags = ["k8s", "kubectl"]
description = "Forcefully kill a k8s pod"
safety = "confirm"
command = """
kubectl delete pod {pod} --grace-period=0 --force
"""

[[recipe]]
name = "dns test from inside a pod"
tags = ["dns", "sollum"]
description = "check if dns resolves from within a pod"
command = '''
kubectl run -i --tty --rm dns-test --image=busybox:1.28 --restart=Never -- nslookup grafana.sunaas.sollum.tech
'''

[[recipe]]
name = "compress videos"
tags = ["ffmpeg"]
description = "use ffmpeg to compress videos while maintaining as much quality as possible"
safety = "confirm"
command = '''
mkdir -p "compressed_480p" && LC_ALL=C printf '%s\0' ./*.{format} | sort -z | while IFS= read -r -d '' f; do bn="${f#./}"; out="compressed_480p/$bn"; if [ -f "$out" ]; then printf '%s SKIP %s\n' "$(date '+%F %T')" "$bn" >> "compressed_480p/convert.log"; continue; fi; if ffmpeg -nostdin -hide_banner -loglevel error -stats -i "$bn" -vf "scale=-2:480" -c:v libx265 -x265-params log-level=error -crf 28 -preset slow -c:a aac -b:a 64k -map 0:v:0 -map 0:a? -sn -dn -n "$out"; then printf '%s DONE %s\n' "$(date '+%F %T')" "$bn" >> "compressed_480p/convert.log"; else printf '%s FAIL %s\n' "$(date '+%F %T')" "$bn" >> "compressed_480p/convert.log"; fi; done
'''
presets = [
  "format=mp4",
  "format=mkv"
]

[[recipe]]
name = "tar a folder"
tags = ["tar"]
description = "create a tar.gz archive from a folder"
safety = "confirm"
command = '''
tar -czvf {archive_name}.tar.gz {folder_path}
'''
